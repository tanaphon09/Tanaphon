<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="เว็บไซต์แสดงผลงานและทักษะของ ธนพนธ์">
    <title>ความภาคภูมิใจของ Tanaphon</title>
    
    <style>
        /* รีเซ็ตค่าเริ่มต้น */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Tahoma", sans-serif;
            line-height: 1.6;
            background: #f4f9f6; /* พื้นหลังสีขาวอมเขียวอ่อนๆ สดชื่นสบายตา */
            color: #2d3748;
        }

        /* Header - สีเขียวปานกลางฤดูใบไม้ผลิไล่เฉด */
        header {
            background: linear-gradient(135deg, #00b4d8, #00ebc7); /* สีฟ้าสดใสตัดเข้าเขียวมิ้นต์ฤดูใบไม้ผลิ */
            color: white;
            text-align: center;
            padding: 60px 20px;
            box-shadow: 0 4px 15px rgba(0, 235, 199, 0.2);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        header p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.95;
        }

        /* Sections - กล่องสีขาวสะอาดพื้นผิวโมเดิร์น */
        section {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
            background: #ffffff; /* สีขาวบริสุทธิ์ */
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        section h2 {
            color: #009688; /* เขียวปานกลาง */
            margin-bottom: 15px;
            border-bottom: 3px solid #00ebc7; /* เส้นใต้สีเขียวใบไม้ผลิ */
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Projects */
        .project {
            margin-top: 20px;
            padding: 20px;
            border-left: 5px solid #00ebc7; /* ขอบเขียวสว่าง */
            background: #f8faf9; /* ขาวนวลสะอาด */
            border-radius: 8px;
            transition: all 0.3s ease;
        }
